<!doctype html>
<html lang="en">

    <title>Leakdig Style Canvas Abnormal Detection</title>
    <script>
      (function snapshotOriginalFunctions() {
        function getFromPath(path, root) {
          return path.split(".").reduce(function (value, key) {
            return value == null ? undefined : value[key];
          }, root || window);
        }

        var paths = [
          "Function",
          "Object.keys",
          "Navigator",
          "navigator.userAgent",
          "window.setInterval",
          "window.setTimeout",
          "window.localStorage.getItem",
          "window.localStorage.setItem",
          "window.sessionStorage.getItem",
          "window.sessionStorage.setItem",
          "Object.getOwnPropertyDescriptor",
          "Object.getOwnPropertyNames",
          "Object.defineProperty",
          "String.prototype.includes",
          "Array.prototype.includes",
          "Document.prototype.getElementById",
          "Document.prototype.createElement",
          "HTMLCanvasElement.prototype.toDataURL",
          "HTMLCanvasElement.prototype.getContext",
          "CanvasRenderingContext2D.prototype.getImageData",
          "CanvasRenderingContext2D.prototype.fillText",
          "CanvasRenderingContext2D.prototype.drawImage",
          "OfflineAudioContext.prototype.createAnalyser",
          "WebGLRenderingContext.prototype.getParameter",
          "WebGLRenderingContext.prototype.bufferData",
          "WebGLRenderingContext.prototype.getExtension",
          "Function.prototype.toString"
        ];

        window.__leakdigOriginalFunctions = Object.freeze(
          paths.reduce(function (snapshot, path) {
            snapshot[btoa(path)] = getFromPath(path);
            return snapshot;
          }, {})
        );
      })();
    </script>

  <body>
    <h1>Leakdig Style Canvas Abnormal Detection</h1>
    <div id="summary" class="summary">Running...</div>
    <table>
      <thead>
        <tr>
          <th>Check</th>
          <th>Status</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="checks"></tbody>
    </table>
    <h2>Raw Result</h2>
    <pre id="raw"></pre>

    <script>
      const methodNames = [
        "getContext",
        "toDataURL",
        "toBlob",
        "fillRect",
        "strokeRect",
        "fillText",
        "strokeText",
        "measureText",
        "getImageData",
        "putImageData",
        "drawImage",
        "createLinearGradient",
        "createRadialGradient",
        "arc",
        "ellipse",
        "bezierCurveTo",
        "quadraticCurveTo"
      ];

      const hashString = (value) => {
        let h = 2166136261;
        for (let i = 0; i < value.length; i++) {
          h ^= value.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      };

      const hashBytes = (bytes) => {
        let h = 2166136261;
        for (let i = 0; i < bytes.length; i++) {
          h ^= bytes[i];
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      };

      const canvasRect = { x: 0, y: 0, width: 260, height: 30 };

      const isChromeLike = () => /\bChrome\/|Chromium\/|Edg\//.test(navigator.userAgent);
      const isFirefoxLike = () => /\bFirefox\//.test(navigator.userAgent);
      const isSafariLike = () => /\bSafari\//.test(navigator.userAgent) && !isChromeLike();
      const isBlinkLike = () => typeof chrome !== "undefined" || isChromeLike();

      const hashUint = (value) => {
        if (!value) return 0;
        let h = 0xb00bface;
        for (let i = 0; i < 32; i++) {
          h = (0x1003f * h) ^ value.charCodeAt(h % value.length);
          h >>>= 0;
        }
        return h >>> 0;
      };

      const getHistogramBins = (data) => {
        const bins = new Array(256).fill(0);
        for (let i = 0; i < data.length; i++) bins[data[i]]++;
        return bins;
      };

      const hasGPURenderer = () => {
        try {
          const canvas = document.createElement("canvas");
          const gl = canvas.getContext("webgl2") || canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
          if (!gl) return { available: false, renderer: null, isSoftware: false };
          const ext = gl.getExtension("WEBGL_debug_renderer_info");
          if (!ext) return { available: false, renderer: null, isSoftware: false };
          const renderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
          return {
            available: !!renderer,
            renderer,
            isSoftware: /SwiftShader|llvmpipe|softpipe|Microsoft Basic Render Driver/i.test(String(renderer))
          };
        } catch {
          return { available: false, renderer: null, isSoftware: false };
        }
      };

      const isNativeFunction = (fn) => {
        try {
          return /\s*\(\)\s*\{\s*\[\s*native\s+code\s*\]\s*\}/.test(Function.prototype.toString.call(fn));
        } catch {
          return false;
        }
      };

      const getFromPath = (path, root = window) => {
        return path.split(".").reduce((value, key) => (value == null ? undefined : value[key]), root);
      };

      const compareData = (left, right) => {
        if (!left || !right || left.length !== right.length) return false;
        for (let i = 0; i < left.length; i++) {
          if (left[i] !== right[i]) return false;
        }
        return true;
      };

      const getPixelDiffSummary = (left, right) => {
        let count = 0;
        let maxDelta = 0;
        for (let i = 0; i < left.length && i < right.length; i++) {
          const delta = Math.abs(left[i] - right[i]);
          if (delta > 0) {
            count++;
            if (delta > maxDelta) maxDelta = delta;
          }
        }
        return { count, maxDelta };
      };

      const stringifyDescriptor = (descriptor) => {
        if (!descriptor) return "missing";
        const copy = {};
        for (const key of ["writable", "enumerable", "configurable", "get", "set", "value"]) {
          if (!(key in descriptor)) continue;
          if (key === "value") {
            copy.valueType = typeof descriptor.value;
            copy.valueName = descriptor.value && descriptor.value.name;
            copy.valueLength = descriptor.value && descriptor.value.length;
          } else if (key === "get" || key === "set") {
            copy[key] = descriptor[key] ? descriptor[key].name || "anonymous" : null;
          } else {
            copy[key] = descriptor[key];
          }
        }
        return JSON.stringify(copy);
      };

      const sameDescriptorShape = (left, right) => {
        if (!left || !right) return left === right;
        return (
          left.writable === right.writable &&
          left.enumerable === right.enumerable &&
          left.configurable === right.configurable &&
          typeof left.value === typeof right.value &&
          typeof left.get === typeof right.get &&
          typeof left.set === typeof right.set
        );
      };

      const getSnapshotComparisonLikeLeakdig = () => {
        const snapshot = window.__leakdigOriginalFunctions;
        if (!snapshot) return [{ path: "snapshot", same: false, currentType: "missing", originalType: "missing" }];
        const results = [];
        for (const encodedPath in snapshot) {
          const path = atob(encodedPath);
          const originalValue = snapshot[encodedPath];
          const currentValue = getFromPath(path);
          results.push({
            path,
            same: originalValue === currentValue,
            currentType: typeof currentValue,
            originalType: typeof originalValue
          });
        }
        return results;
      };

      const getNavigatorKeysLikeLeakdig = () => {
        try {
          return Object.keys(window.navigator || {});
        } catch {
          return [];
        }
      };

      const getScreenKeysLikeLeakdig = () => {
        try {
          return Object.keys(window.screen || {});
        } catch {
          return [];
        }
      };

      const getPluginToStringLikeLeakdig = () => {
        try {
          const value = navigator.plugins.toString() || "";
          return value.replace(/\s+/g, "").slice(0, 60);
        } catch (error) {
          return "error:" + String((error && error.message) || error);
        }
      };

      const getEvalFunctionLengthLikeLeakdig = () => {
        try {
          return eval.toString().length;
        } catch {
          return -1;
        }
      };

      const checkSupportCanvasContext2DLikeLeakdig = () => {
        try {
          return !!document.createElement("canvas").getContext("2d");
        } catch {
          return false;
        }
      };

      const checkSupportCanvasFillTextLikeLeakdig = () => {
        try {
          const ctx = document.createElement("canvas").getContext("2d");
          return typeof ctx.fillText === "function";
        } catch {
          return false;
        }
      };

      const checkSupportCanvasToDataURLLikeLeakdig = () => {
        try {
          return typeof document.createElement("canvas").toDataURL === "function";
        } catch {
          return false;
        }
      };

      const checkSupportOffscreenCanvasLikeLeakdig = () => {
        return typeof OffscreenCanvas !== "undefined";
      };

      const windowLengthHookLikeLeakdig = () => {
        try {
          return window.frames.length !== parent.frames.length;
        } catch {
          return true;
        }
      };

      const windowSelfTopHookLikeLeakdig = () => {
        try {
          return window.self !== window.top;
        } catch {
          return true;
        }
      };

      const windowSelfTopLoopHookLikeLeakdig = () => {
        try {
          let current = window;
          for (let i = 0; i < 15; i++) {
            current = current.parent;
            if (current !== window.self) return true;
          }
          return false;
        } catch {
          return true;
        }
      };

      const windowHookLikeLeakdig = () => {
        return {
          length: windowLengthHookLikeLeakdig(),
          selfTop: windowSelfTopHookLikeLeakdig(),
          selfTopLoop: windowSelfTopLoopHookLikeLeakdig()
        };
      };

      const checkWebglInfoHookLikeLeakdig = () => {
        try {
          const canvas = document.createElement("canvas");
          const gl =
            canvas.getContext("webgl2") ||
            canvas.getContext("experimental-webgl2") ||
            canvas.getContext("webgl") ||
            canvas.getContext("experimental-webgl") ||
            canvas.getContext("moz-webgl");
          if (!gl) return { suspicious: false, score: "-", reason: "no-webgl" };
          const ext = gl.getExtension("WEBGL_debug_renderer_info");
          if (!ext) return { suspicious: false, score: "-", reason: "no-debug-renderer-info" };
          const rendererParam = ext.UNMASKED_RENDERER_WEBGL;
          const started = performance.now();
          let calls = 0;
          while (performance.now() - started < 5) {
            for (let i = 0; i < 10; i++) gl.getParameter(rendererParam);
            calls += 10;
          }
          const elapsed = performance.now() - started;
          const score = Math.round(calls / elapsed);
          return { suspicious: score > 100, score, elapsed: Number(elapsed.toFixed(3)), calls };
        } catch (error) {
          return { suspicious: false, score: "-", reason: String((error && error.message) || error) };
        }
      };

      const createCleanRealm = () => {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = "about:blank";
        document.documentElement.appendChild(iframe);
        return {
          win: iframe.contentWindow,
          dispose: () => iframe.remove()
        };
      };

      const getOwner = (methodName, win = window) => {
        if (methodName === "getContext" || methodName === "toDataURL" || methodName === "toBlob") {
          return win.HTMLCanvasElement.prototype;
        }
        return win.CanvasRenderingContext2D.prototype;
      };

      const getMethod = (methodName, win = window) => {
        return getOwner(methodName, win)[methodName];
      };

      const captureCallError = (fn) => {
        try {
          fn();
          return { threw: false, name: "", message: "", stackHash: 0, firstStackLine: "" };
        } catch (error) {
          const stack = String((error && error.stack) || "");
          return {
            threw: true,
            name: String((error && error.name) || ""),
            message: String((error && error.message) || ""),
            stackHash: hashString(stack),
            firstStackLine: stack.split("\n")[0] || ""
          };
        }
      };

      const compareErrorShape = (left, right) => {
        return left.threw === right.threw && left.name === right.name && left.message === right.message;
      };

      const getApiTamperFlagsLikeLeakdig = (ctx) => {
        const flags = [];
        const canvasProto = HTMLCanvasElement.prototype;
        const ctxProto = CanvasRenderingContext2D.prototype;
        const checks = [
          [1, canvasProto, "getContext"],
          [1, canvasProto, "toDataURL"],
          [1, canvasProto, "toBlob"],
          [1, ctxProto, "getImageData"],
          [1, ctxProto, "fillText"],
          [1, ctxProto, "strokeText"],
          [1, ctxProto, "drawImage"],
          [1, ctxProto, "createLinearGradient"],
          [1, ctxProto, "bezierCurveTo"]
        ];

        for (const [flag, owner, name] of checks) {
          const fn = owner && owner[name];
          if (typeof fn !== "function") {
            flags.push(flag + ":" + name + ":missing");
            continue;
          }
          const src = Function.prototype.toString.call(fn);
          if (!/\[native code\]/.test(src)) flags.push(flag + ":" + name + ":source");
          if (Object.getOwnPropertyNames(fn).filter((key) => !["length", "name"].includes(key)).length) {
            flags.push(flag + ":" + name + ":own-props");
          }
        }

        const referenceMethods = [
          "createLinearGradient",
          "fillRect",
          "beginPath",
          "moveTo",
          "lineTo",
          "bezierCurveTo",
          "fillText",
          "drawImage",
          "getImageData"
        ];
        for (const name of referenceMethods) {
          const value = ctx[name];
          if (typeof value === "function" && value !== ctxProto[name]) {
            flags.push("1:" + name + ":instance-reference");
          }
        }

        return flags;
      };

      const getProxyHookLikeLeakdig = (ctx) => {
        const flags = [];
        const probeMethods = ["fillRect", "fillText", "getImageData", "drawImage", "createLinearGradient"];
        for (const name of probeMethods) {
          const fn = ctx[name];
          const protoFn = CanvasRenderingContext2D.prototype[name];
          if (typeof fn !== "function" || typeof protoFn !== "function") continue;

          const ownNames = Object.getOwnPropertyNames(fn).filter((key) => !["length", "name"].includes(key));
          if (ownNames.length) flags.push(name + ":function-own-props:" + ownNames.join(","));
          if (fn !== protoFn) flags.push(name + ":proxy-or-bound-reference");

          const direct = captureCallError(() => fn.call({}, 0, 0, 1, 1));
          const protoDirect = captureCallError(() => protoFn.call({}, 0, 0, 1, 1));
          if (!compareErrorShape(direct, protoDirect)) {
            flags.push(name + ":illegal-invocation-shape");
          }
        }
        return flags;
      };

      const proxyHookHandleLikeLeakdig = (value) => {
        try {
          Date.prototype.toString.call(value);
        } catch (error) {
          return String((error && error.stack) || "").includes("Proxy.");
        }
        return false;
      };

      const getFullProxyHookLikeLeakdig = (ctx) => {
        const candidates = [
          ["Function.prototype", Function.prototype],
          ["Function.prototype.toString", Function.prototype.toString],
          ["Navigator.prototype.toString", Navigator.prototype.toString],
          ["Object.prototype.toString", Object.prototype.toString],
          ["JSON.stringify", JSON.stringify],
          ["HTMLCanvasElement.prototype", HTMLCanvasElement.prototype],
          ["HTMLCanvasElement.prototype.getContext", HTMLCanvasElement.prototype.getContext],
          ["HTMLCanvasElement.prototype.toDataURL", HTMLCanvasElement.prototype.toDataURL],
          ["CanvasRenderingContext2D.prototype", CanvasRenderingContext2D.prototype],
          ["CanvasRenderingContext2D.prototype.getImageData", CanvasRenderingContext2D.prototype.getImageData],
          ["ctx.getImageData", ctx && ctx.getImageData],
          ["window.setInterval", window.setInterval],
          ["window.setTimeout", window.setTimeout],
          ["localStorage.getItem", window.localStorage && window.localStorage.getItem],
          ["localStorage.setItem", window.localStorage && window.localStorage.setItem],
          ["sessionStorage.getItem", window.sessionStorage && window.sessionStorage.getItem],
          ["sessionStorage.setItem", window.sessionStorage && window.sessionStorage.setItem],
          ["Object.keys", Object.keys]
        ];
        return candidates
          .filter((entry) => proxyHookHandleLikeLeakdig(entry[1]))
          .map((entry) => entry[0]);
      };

      const checkPrototypeMethodHook = (instance, constructor, methodName) => {
        try {
          return instance[methodName] !== constructor.prototype[methodName];
        } catch {
          return true;
        }
      };

      const checkPrototypeMethodToStringHook = (instance, constructor, methodName) => {
        try {
          return instance[methodName].toString !== constructor.prototype[methodName].toString;
        } catch {
          return true;
        }
      };

      const checkPrototypeMethodToStringCallbackHook = (instance, constructor, methodName) => {
        try {
          return !isNativeFunction(instance[methodName]) || !isNativeFunction(constructor.prototype[methodName]);
        } catch {
          return true;
        }
      };

      const checkHookLikeLeakdig = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const fn = function () {};
        const checks = [
          ["canvas.getContext reference", checkPrototypeMethodHook(canvas, HTMLCanvasElement, "getContext")],
          ["canvas.getContext toString reference", checkPrototypeMethodToStringHook(canvas, HTMLCanvasElement, "getContext")],
          ["canvas.getContext native callback", checkPrototypeMethodToStringCallbackHook(canvas, HTMLCanvasElement, "getContext")],
          ["canvas.toDataURL reference", checkPrototypeMethodHook(canvas, HTMLCanvasElement, "toDataURL")],
          ["canvas.toDataURL toString reference", checkPrototypeMethodToStringHook(canvas, HTMLCanvasElement, "toDataURL")],
          ["canvas.toDataURL native callback", checkPrototypeMethodToStringCallbackHook(canvas, HTMLCanvasElement, "toDataURL")],
          ["ctx.getImageData reference", checkPrototypeMethodHook(ctx, CanvasRenderingContext2D, "getImageData")],
          ["ctx.getImageData toString reference", checkPrototypeMethodToStringHook(ctx, CanvasRenderingContext2D, "getImageData")],
          ["ctx.getImageData native callback", checkPrototypeMethodToStringCallbackHook(ctx, CanvasRenderingContext2D, "getImageData")],
          ["navigator.toString reference", checkPrototypeMethodHook(navigator, Navigator, "toString")],
          ["navigator.toString toString reference", checkPrototypeMethodToStringHook(navigator, Navigator, "toString")],
          ["navigator.toString native callback", checkPrototypeMethodToStringCallbackHook(navigator, Navigator, "toString")],
          ["document.getElementById native", !isNativeFunction(document.getElementById)],
          ["document.createElement native", !isNativeFunction(document.createElement)],
          ["JSON.stringify native", !isNativeFunction(JSON.stringify)],
          ["JSON.parse native", !isNativeFunction(JSON.parse)],
          ["window.setInterval native", !isNativeFunction(window.setInterval)],
          ["window.eval native", !isNativeFunction(window.eval)],
          ["window.matchMedia native", !isNativeFunction(window.matchMedia)],
          ["Object.getOwnPropertyNames native", !isNativeFunction(Object.getOwnPropertyNames)],
          ["Function.prototype.toString reference", checkPrototypeMethodHook(fn, Function, "toString")],
          ["Function.prototype.toString native callback", checkPrototypeMethodToStringCallbackHook(fn, Function, "toString")]
        ];
        return checks.filter((entry) => entry[1]).map((entry) => entry[0]);
      };

      const getOwnPropertyDescriptorHookLikeLeakdig = () => {
        const flags = [];
        if (proxyHookHandleLikeLeakdig(navigator)) flags.push("navigator:proxy-stack");
        try {
          if (typeof Object.getOwnPropertyDescriptor(navigator, "maxTouchPoints") === "object") {
            flags.push("navigator.maxTouchPoints:own-descriptor");
          }
        } catch (error) {
          flags.push("navigator.maxTouchPoints:descriptor-error");
        }
        try {
          if (
            navigator.connection &&
            typeof Object.getOwnPropertyDescriptor(navigator.connection, "rtt") === "object"
          ) {
            flags.push("navigator.connection.rtt:own-descriptor");
          }
        } catch (error) {
          flags.push("navigator.connection.rtt:descriptor-error");
        }
        return flags;
      };

      const detectionFunctionToStringTamperLikeLeakdig = () => {
        try {
          Function.prototype.toString.call({});
          return { suspicious: false, stack: "" };
        } catch (error) {
          const stack = String((error && error.stack) || "");
          const needles = [
            "chrome-extension://",
            "moz-extension://",
            "safari-extension://",
            "extension://",
            "content-scripts/",
            "injected.js"
          ];
          return {
            suspicious: needles.some((needle) => stack.includes(needle)),
            stack: stack.split("\n").slice(0, 5).join("\n")
          };
        }
      };

      const getNativeApiTamperFlagsLikeLeakdig = () => {
        const flags = [];
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
          const audioCtor = window.OfflineAudioContext || window.webkitOfflineAudioContext;
          const audio = audioCtor ? new audioCtor(1, 44100, 44100) : null;

          const navigatorKeys = Object.keys(window.navigator || {});
          if (navigatorKeys.length && !navigatorKeys.some((key) => ["mozApps", "mozTCPSocket"].includes(key))) {
            flags.push("navigator");
          }
          const screenKeys = Object.keys(window.screen || {});
          if (screenKeys.length) flags.push("screen");

          if (Object.getOwnPropertyDescriptors) {
            const navigatorDescriptorKeys = Object.keys(Object.getOwnPropertyDescriptors(window.navigator || {}));
            const screenDescriptorKeys = Object.keys(Object.getOwnPropertyDescriptors(window.screen || {}));
            if (!navigatorKeys.length && navigatorDescriptorKeys.length) flags.push("navigator:descriptors");
            if (!screenKeys.length && screenDescriptorKeys.length) flags.push("screen:descriptors");
          }

          if (canvas && canvas.toDataURL && !isNativeFunction(canvas.toDataURL)) flags.push("toDataURL");
          if (ctx && ctx.getImageData && !isNativeFunction(ctx.getImageData)) flags.push("getImageData");
          if (audio && audio.createAnalyser && !isNativeFunction(audio.createAnalyser)) flags.push("createAnalyser");
          if (
            gl &&
            Object.getOwnPropertyDescriptor &&
            WebGLRenderingContext &&
            Object.getOwnPropertyDescriptor(WebGLRenderingContext.prototype, "bufferData") &&
            !isNativeFunction(Object.getOwnPropertyDescriptor(WebGLRenderingContext.prototype, "bufferData").value)
          ) {
            flags.push("bufferData");
          }
          if (
            gl &&
            Object.getOwnPropertyDescriptor &&
            WebGLRenderingContext &&
            Object.getOwnPropertyDescriptor(WebGLRenderingContext.prototype, "getParameter") &&
            !isNativeFunction(Object.getOwnPropertyDescriptor(WebGLRenderingContext.prototype, "getParameter").value)
          ) {
            flags.push("getParameter");
          }
        } catch (error) {
          flags.push("exception:" + String((error && error.message) || error));
        }
        return flags;
      };

      const renderFingerprintCanvas = (canvas) => {
        canvas.width = canvasRect.width;
        canvas.height = canvasRect.height;
        const ctx = canvas.getContext("2d");
        const text = "https://browserscan.ai";
        ctx.textBaseline = "top";
        ctx.font = "14px 'Times New Roman'";
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = "#f60";
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = "#069";
        ctx.fillText(text, 2, 15);
        ctx.fillText("🙂", 150, 15);
        ctx.font = "22px 'Arial'";
        ctx.fillStyle = "rgba(102, 204, 0, 0.5)";
        ctx.fillText(text, 2, 22);
        ctx.fillText("🙂", 220, 22);
        ctx.fillStyle = "rgba(255,255,255,1)";
        ctx.fillRect(0, 0, 1, 1);
        return ctx;
      };

      const renderSemanticCanvas = (canvas) => {
        canvas.width = 280;
        canvas.height = 120;
        const ctx = canvas.getContext("2d");
        const gradient = ctx.createLinearGradient(0, 0, 280, 0);
        gradient.addColorStop(0, "#102a43");

              "medium"
            );

            const ownNames = Object.getOwnPropertyNames(method).filter((key) => !["length", "name"].includes(key));
            const cleanOwnNames = Object.getOwnPropertyNames(cleanMethod).filter((key) => !["length", "name"].includes(key));
            addCheck(
              methodName + " own properties",
              ownNames.join("|") !== cleanOwnNames.join("|"),
              { current: ownNames, clean: cleanOwnNames },
              "medium"
            );
          }

          const snapshotResults = getSnapshotComparisonLikeLeakdig();
          const snapshotMismatches = snapshotResults.filter((result) => !result.same);
          addCheck(
            "leakdig original function snapshot",
            snapshotMismatches.length > 0,
            { mismatches: snapshotMismatches, all: snapshotResults },
            "high"
          );

          const navigatorKeys = getNavigatorKeysLikeLeakdig();
          const screenKeys = getScreenKeysLikeLeakdig();
          addCheck(
            "leakdig navigator/screen own keys",
            navigatorKeys.length > 0 || screenKeys.length > 0,
            { navigatorKeys, screenKeys },
            "medium"
          );

          const pluginToString = getPluginToStringLikeLeakdig();
          addCheck(
            "leakdig plugin toString",
            /^error:/.test(pluginToString),
            { value: pluginToString },
            "medium"
          );

          const evalLength = getEvalFunctionLengthLikeLeakdig();
          addCheck(
            "leakdig eval function length",
            evalLength <= 0,
            { length: evalLength },
            "medium"
          );

          const windowHook = windowHookLikeLeakdig();
          addCheck(
            "leakdig windowHook flags",
            windowHook.length || windowHook.selfTop || windowHook.selfTopLoop,
            windowHook,
            "medium"
          );

          const webglInfoHook = checkWebglInfoHookLikeLeakdig();
          addCheck("leakdig webgl info hook timing", webglInfoHook.suspicious, webglInfoHook, "medium");

          const nativeApiFlags = getNativeApiTamperFlagsLikeLeakdig();
          addCheck("leakdig native api tamper flags", nativeApiFlags.length > 0, { flags: nativeApiFlags }, "high");

          const hookFlags = checkHookLikeLeakdig();
          addCheck("leakdig checkHook flags", hookFlags.length > 0, { flags: hookFlags }, "high");

          const descriptorHookFlags = getOwnPropertyDescriptorHookLikeLeakdig();
          addCheck("leakdig descriptor hook flags", descriptorHookFlags.length > 0, { flags: descriptorHookFlags }, "high");

          const functionStackTamper = detectionFunctionToStringTamperLikeLeakdig();
          addCheck("leakdig function toString stack tamper", functionStackTamper.suspicious, functionStackTamper, "medium");

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          const support = {
            context2D: checkSupportCanvasContext2DLikeLeakdig(),
            fillText: checkSupportCanvasFillTextLikeLeakdig(),
            toDataURL: checkSupportCanvasToDataURLLikeLeakdig(),
            offscreenCanvas: checkSupportOffscreenCanvasLikeLeakdig()
          };
          addCheck(
            "leakdig canvas support",
            !support.context2D || !support.fillText || !support.toDataURL,
            support,
            "high"
          );

          addCheck(
            "extension injection sanity",
            false,
            {
              protocol: location.protocol,
              fileProtocolWithoutCanvasFlags: location.protocol === "file:" && getApiTamperFlagsLikeLeakdig(ctx).length === 0,
              note:
                "file:// pages are often not covered by extension content scripts unless file access is enabled. Serve this page over http://localhost for reliable testing."
            },
            "info"
          );

          addCheck(
            "context prototype",
            Object.getPrototypeOf(ctx) !== CanvasRenderingContext2D.prototype || !(ctx instanceof CanvasRenderingContext2D),
            {
              prototypeMatches: Object.getPrototypeOf(ctx) === CanvasRenderingContext2D.prototype,
              instanceofContext: ctx instanceof CanvasRenderingContext2D
            },
            "high"
          );

          const instanceMismatches = [];
          for (const methodName of methodNames) {
            if (methodName === "getContext" || methodName === "toDataURL" || methodName === "toBlob") continue;
            if (typeof ctx[methodName] !== "function") continue;
            if (ctx[methodName] !== CanvasRenderingContext2D.prototype[methodName]) {
              instanceMismatches.push(methodName);
            }
            if (ctx[methodName] !== ctx[methodName]) {
              instanceMismatches.push(methodName + ":unstable-reference");
            }
          }
          addCheck("context method reference", instanceMismatches.length > 0, { mismatches: instanceMismatches }, "high");

          const apiTamperFlags = getApiTamperFlagsLikeLeakdig(ctx);
          addCheck("leakdig-like api tamper flags", apiTamperFlags.length > 0, { flags: apiTamperFlags }, "high");

          const proxyFlags = getProxyHookLikeLeakdig(ctx);
          addCheck("leakdig-like proxy hook flags", proxyFlags.length > 0, { flags: proxyFlags }, "high");

          const fullProxyFlags = getFullProxyHookLikeLeakdig(ctx);
          addCheck("leakdig full proxyHook flags", fullProxyFlags.length > 0, { flags: fullProxyFlags }, "high");

          const ownContextMethods = Object.getOwnPropertyNames(ctx).filter(
            (key) => methodNames.includes(key) || typeof ctx[key] === "function"
          );
          addCheck("context own methods", ownContextMethods.length > 0, { ownContextMethods }, "medium");

          const probe = document.createElement("canvas");
          const probeCtx = renderSemanticCanvas(probe);
          const dataUrlA = probe.toDataURL();
          const dataUrlB = probe.toDataURL();
          const imageDataA = probeCtx.getImageData(0, 0, probe.width, probe.height);
          const imageDataB = probeCtx.getImageData(0, 0, probe.width, probe.height);
          addCheck(
            "canvas read stability",
            dataUrlA !== dataUrlB || hashBytes(imageDataA.data) !== hashBytes(imageDataB.data),
            {
              dataUrlA: hashString(dataUrlA),
              dataUrlB: hashString(dataUrlB),
              imageDataA: hashBytes(imageDataA.data),
              imageDataB: hashBytes(imageDataB.data)
            },
            "high"
          );

          const gradientRing = getGradientRingReport();
          addCheck(
            "canvas ring pseudo-gradient vs true-gradient",
            !gradientRing.pseudo.stable || !gradientRing.real.stable || !gradientRing.pseudoAndRealDiffer,
            gradientRing,
            "high"
          );

          const singlePixel = getSinglePixelReport();
          addCheck(
            "canvas single-pixel exact readback",
            !singlePixel.blankExact ||
              !singlePixel.fillStable ||
              !singlePixel.fillExpected ||
              !singlePixel.putStable ||
              !singlePixel.putExpected,
            singlePixel,
            "high"
          );

          const leakdigProbe = document.createElement("canvas");
          const leakdigCtx = renderFingerprintCanvas(leakdigProbe);
          const leakdigDataUrlA = leakdigProbe.toDataURL();
          const leakdigDataUrlB = leakdigProbe.toDataURL();
          const generatedCanvasData = generateCanvasDataLikeLeakdig();
          addCheck(
            "leakdig 260x30 fingerprint stability",
            leakdigDataUrlA !== leakdigDataUrlB || !generatedCanvasData.dataURL,
            {
              dataUrlA: hashString(leakdigDataUrlA),
              dataUrlB: hashString(leakdigDataUrlB),
              generatedDataUrl: hashString(generatedCanvasData.dataURL || ""),
              pixelChecksum: getPixelChecksumLikeLeakdig(leakdigCtx),
              colorCount240x30: countColorsOptimizedLikeLeakdig(leakdigCtx)
            },
            "high"
          );

          addCheck(
            "leakdig toDataURL native check",
            !isNativeFunction(document.createElement("canvas").toDataURL),
            { sourceHash: hashString(Function.prototype.toString.call(document.createElement("canvas").toDataURL)) },
            "high"
          );

          const dataUrlRendering = await checkDataUrlRenderingLikeLeakdig();
          addCheck("leakdig dataURL rendering check", !dataUrlRendering.ok && !dataUrlRendering.unsupported, dataUrlRendering, "high");

          const base64Equal = await checkBase64EqualLikeLeakdig();
          addCheck("leakdig fixed base64 render/export stability", !base64Equal.stable && !base64Equal.unsupported, base64Equal, "high");

          const drawImageLikeLeakdig = await isDrawImagePixelConsistentLikeLeakdig();
          addCheck("leakdig drawImage dataURL pixel consistency", !drawImageLikeLeakdig.ok, drawImageLikeLeakdig, "high");

          const simpleCanvas = getSimpleCanvasDataLikeLeakdig();
          addCheck(
            "leakdig simple canvas availability",
            !simpleCanvas || simpleCanvas === "-",
            { hash: hashString(simpleCanvas || ""), length: simpleCanvas ? simpleCanvas.length : 0 },
            "medium"
          );

          const complex = getComplexCanvasDataLikeLeakdig();
          const complexHistogram = getHistogramBins(complex.pixelData);
          addCheck(
            "leakdig complex canvas statistics",
            !complex.base64 || !complex.valueBase64 || complex.pixelData.length === 0,
            {
              base64Hash: hashString(complex.base64 || ""),
              valueBase64Hash: hashString(complex.valueBase64 || ""),
              evenodd: complex.evenodd,
              pixelHash: hashBytes(complex.pixelData),
              histogramHash: hashString(complexHistogram.join(",")),
              colorCount: countColors(complex.pixelData)
            },
            "medium"
          );

          const blinkNoise = await getBlinkCanvasNoiseLikeLeakdig();
          addCheck("leakdig blink canvas noise map", !blinkNoise.ok && !blinkNoise.skipped, blinkNoise, "high");

          const blank = document.createElement("canvas");
          blank.width = 8;
          blank.height = 8;
          const blankData = blank.getContext("2d").getImageData(0, 0, 8, 8).data;
          const blankChanged = Array.from(blankData).some((value, index) => {
            return index % 4 === 3 ? value !== 0 : value !== 0;
          });
          addCheck("blank canvas unchanged", blankChanged, { hash: hashBytes(blankData), colors: countColors(blankData) }, "high");

          const solid = document.createElement("canvas");
          solid.width = 32;
          solid.height = 32;
          const solidCtx = solid.getContext("2d");
          solidCtx.fillStyle = "#224466";
          solidCtx.fillRect(0, 0, 32, 32);
          const solidData = solidCtx.getImageData(0, 0, 32, 32).data;
          addCheck("solid color low entropy", countColors(solidData) !== 1, { colors: countColors(solidData), hash: hashBytes(solidData) }, "medium");

          const imageResult = drawImageConsistency();
          addCheck("drawImage pixel consistency", !imageResult.stable, imageResult, "high");
        } catch (error) {
          addCheck("runner exception", true, { message: error && error.message, stack: error && error.stack }, "high");
        } finally {
          clean.dispose();
          renderResults();
        }
      };

      run();
    </script>
  </body>
</html>
