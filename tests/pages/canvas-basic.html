<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Canvas Basic Fingerprint Tests</title>
  </head>
  <body>
    <pre id="out"></pre>
    <script>
      const out = document.getElementById("out");
      const hash = (value) => {
        let h = 2166136261;
        for (let i = 0; i < value.length; i++) {
          h ^= value.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      };

      const solid = document.createElement("canvas");
      solid.width = 80;
      solid.height = 40;
      const solidCtx = solid.getContext("2d");
      solidCtx.fillStyle = "#336699";
      solidCtx.fillRect(0, 0, 80, 40);

      const risky = document.createElement("canvas");
      risky.width = 240;
      risky.height = 80;
      const ctx = risky.getContext("2d");
      const gradient = ctx.createLinearGradient(0, 0, 240, 0);
      gradient.addColorStop(0, "#111");
      gradient.addColorStop(1, "#ddd");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 240, 80);
      ctx.font = "20px Arial";
      ctx.fillStyle = "#2244aa";
      ctx.fillText("Fingerprint Canvas", 12, 42);
      ctx.beginPath();
      ctx.moveTo(10, 70);
      ctx.bezierCurveTo(80, 2, 120, 95, 220, 20);
      ctx.stroke();

      out.textContent = JSON.stringify({
        solid: hash(solid.toDataURL()),
        risky: hash(risky.toDataURL()),
        measureText: ctx.measureText("Fingerprint Canvas").width
      }, null, 2);
    </script>
  </body>
</html>
